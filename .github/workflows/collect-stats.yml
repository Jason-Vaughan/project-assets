name: collect-stats

on:
  schedule:
    # Five times daily, anchored to PDT (US/Pacific in summer):
    #   03 UTC = 8 PM prev (PDT) / 7 PM (PST)
    #   09 UTC = 2 AM (PDT)      / 1 AM (PST)
    #   13 UTC = 6 AM (PDT)      / 5 AM (PST)
    #   17 UTC = 10 AM (PDT)     / 9 AM (PST)
    #   22 UTC = 3 PM (PDT)      / 2 PM (PST)
    # Cron is fixed UTC; PT times shift 1 hour earlier in standard time (Nov-Mar).
    - cron: '0 3,9,13,17,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-stats
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runtime deps
        run: npm i js-yaml --no-save --no-audit --no-fund

      - name: Run collector
        env:
          STATS_COLLECTOR_TOKEN: ${{ secrets.STATS_COLLECTOR_TOKEN }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
        run: node scripts/collect-stats.mjs

      - name: Commit updated stats
        run: |
          git config user.name  "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add '*-stats.json' _collect-meta.json
          if git diff --cached --quiet; then
            echo "No stats changes."
          else
            git commit -m "chore(stats): refresh $(date -u +%FT%TZ)"
            git push
          fi
