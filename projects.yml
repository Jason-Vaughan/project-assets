# Centralized stats collector config.
#
# Strategy: collector auto-discovers every Jason-Vaughan repo via the GitHub API.
# This file only contains exclusions, slug renames, and per-project overrides.
# Adding a new repo requires NO change here — sane defaults apply automatically.

# Repos to skip entirely.
# Add slugs (case-insensitive match against repo name) for: archived experiments,
# dotfiles, scratch repos, anything you don't want in the totals.
exclude:
  - project-assets          # collector's own repo (assets only, would self-track)
  - OnDeck                  # superseded V1 of OnDeck-V9 (would double-count)
  - tilt-v1-archive         # archived TiLT predecessor
  - tilt-v1-wrapper-archive # archived TiLT predecessor
  - barcoach-assets         # assets-only repo
  - rentalclaw-bunker       # archive/storage

# Forks are skipped by default. Add repo names here to track despite being a fork.
includeForks: []

# Map a GitHub repo name to a custom slug used for the stats JSON filename.
# Without an entry, the slug is the repo name lowercased.
slugs:
  OnDeck-V9: ondeck

# Per-project counter / LOC profile / branch overrides.
# Key is the repo name (case-insensitive). Without an entry, defaults apply
# (default branch from the GitHub API, standard LOC profile, no custom counters).
overrides:
  TangleClaw:
    loc:
      include: ['*.js', '*.mjs']
      exclude: ['node_modules', '.min.']
    counters: [tangleclaw]

  TiLT:
    loc:
      include: ['*.js', '*.ts', '*.jsx', '*.tsx']
      exclude: ['node_modules', '.next', '.min.']
    counters: [tilt]

  # OnDeck-V9 main is frozen at June 2025; active V2.1+ work lives on
  # ci/stats-workflow (test suite stabilization, V9->V2 cleanup, DB restoration).
  # Remove this branch override when ci/stats-workflow is merged into main.
  OnDeck-V9:
    branch: ci/stats-workflow

  # Cierre Sensei lives on Replit, not GitHub. The Jason-Vaughan/cierre-sensei
  # repo only contains data files; the actual source + commit history is on
  # Replit, which exposes a stats endpoint we fetch instead of cloning.
  cierre-sensei:
    remoteStats: https://cierresensei.com/api/stats.json
    fixedFields:
      firstCommit: "2024-09-01"

defaultLoc:
  include: ['*.js', '*.ts', '*.jsx', '*.tsx', '*.mjs']
  exclude: ['node_modules', '.next', 'dist', '.min.']
